workflows:
  android-debug:
    name: Android Debug APK

    environment:
      node: 18
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          rm -rf node_modules
          npm install

      - name: Build web app
  script: |
    npm ls typescript
    npm ls vite
    npm ls @vitejs/plugin-react
    npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
