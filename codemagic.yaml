workflows:
  android-debug:
    name: Android Debug APK

    environment:
      node: 18
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          rm -rf node_modules
          npm install

      - name: Build web app
        script: |
          npx tsc -p tsconfig.json --noEmit
          npx vite build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
